<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Book Library</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #fdf6f9;
      color: #444;
    }

    header {
      background: linear-gradient(135deg, #ffd6e0, #e7c6ff);
      padding: 30px;
      text-align: center;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      margin-top: 5px;
      opacity: 0.8;
    }

    nav {
      text-align: center;
      margin: 15px 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #7b5ea7;
      font-weight: 500;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .book {
      background: #ffffff;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .book:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.12);
    }

    .book img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .book h3 {
      margin: 5px 0;
      font-size: 1.1em;
    }

    .book p {
      font-size: 0.9em;
      opacity: 0.7;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #ffe5ec;
      margin-top: 20px;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>📚 Cozy Library</h1>
    <p>Your soft aesthetic reading space ✨</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Library</a>
    <a href="#">Favorites</a>
  </nav>

  <div class="container">

    <div class="book">
      <img src="https://covers.openlibrary.org/b/id/7222246-L.jpg">
      <h3>The Great Gatsby</h3>
      <p>F. Scott Fitzgerald</p>
    </div>

    <div class="book">
      <img src="https://covers.openlibrary.org/b/id/8225261-L.jpg">
      <h3>To Kill a Mockingbird</h3>
      <p>Harper Lee</p>
    </div>

    <div class="book">
      <img src="https://covers.openlibrary.org/b/id/153541-L.jpg">
      <h3>1984</h3>
      <p>George Orwell</p>
    </div>

    <div class="book">
      <img src="https://covers.openlibrary.org/b/id/10594765-L.jpg">
      <h3>Pride and Prejudice</h3>
      <p>Jane Austen</p>
    </div>

  </div>

  <footer>
    <p>Made with ☕ + 📖 vibes</p>
  </footer>

  <!-- Watson Assistant Chat -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "007ccb98-34be-4086-a929-c33916077b64",
      region: "eu-de",
      serviceInstanceID: "f3f2da03-ddee-4da0-b22f-2a7277620229",
      onLoad: async (instance) => { await instance.render(); }
    };
    setTimeout(function(){
      const t = document.createElement('script');
      t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
              + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
              + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>
